# Local development: Postgres only. Run the API with: go run ./cmd/goflow
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: goflow
      POSTGRES_PASSWORD: goflow
      POSTGRES_DB: goflow
    ports:
      - "5433:5432"
    volumes:
      - goflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goflow -d goflow"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  goflow_pgdata:
